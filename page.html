<!DOCTYPE html>
<html>

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>SB To Do List</title>
 <link rel="stylesheet" href="page.css">
</head>

<body>
 <div class="container">
 
 <h1> <span id="logo">SB</span> To Do List</h1>
 
 <div class="display-field">
  <input type="text" id="text" placeholder="write your task">
  <button id="add-btn">Add Task</button>
  <p id="message"></p>
 </div>
 
 <div class="list"></div>
 
 <div class="total">
  <p>Total Tasks: <span id="task-count">0</span></p>
 </div>
</div>
<script src="page.js"></script>
</body>

</html>
